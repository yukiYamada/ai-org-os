name: runtime tests

on:
  push:
    branches:
      - main
    paths:
      - 'runtime/**'
      - '.github/workflows/runtime-tests.yml'
  pull_request:
    paths:
      - 'runtime/**'
      - '.github/workflows/runtime-tests.yml'

jobs:
  test:
    name: runtime/tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        # Phase 3 で Nexus (Python MCP server) を導入。
        # storage 層と E2E は標準ライブラリのみで動くため mcp パッケージは CI 不要。
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: chmod scripts
        # Windows でコミットされた実行ビットが落ちている可能性に備えて。
        run: |
          chmod +x runtime/pillars/lifecycle/spawn-mind.sh
          chmod +x runtime/pillars/lifecycle/kill-mind.sh
          chmod +x runtime/pillars/lifecycle/list-minds.sh
          chmod +x runtime/pillars/lifecycle/mind-loop.sh
          chmod +x runtime/pillars/conduit/start.sh
          chmod +x runtime/tests/run-tests.sh
          chmod +x runtime/tests/test-*.sh

      - name: run runtime tests
        env:
          # venv 作成 + pip install を伴うテストは CI ではスキップ
          # （ネットワークと時間の節約、test-nexus-start.sh が SKIP_VENV_TESTS を見る）
          SKIP_VENV_TESTS: '1'
        run: ./runtime/tests/run-tests.sh
