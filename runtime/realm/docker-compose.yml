# Realm コンテナ起動定義。
#
# build.context は repo root。runtime/realm/ から見て親（..）が repo root。
# Codex P2 PR #32 の指摘で COPY ソースは context-relative。
#
# 系譜:
# - Phase 5a-1: 最小コンテナ + bind mount
# - Phase 5a-2 (ADR-0011): Pillar 群は runtime/pillars/ 配下、bind mount で配信
# - Phase 5a-3 (#38): Judgment Pillar の anthropic SDK は image に焼く、API key を env パススルー
# - Phase 5b-1 (#71): Conductor Pillar が常駐 (CMD は Dockerfile 側で設定)、周期環境変数を追加

services:
  realm:
    build:
      context: ../..
      dockerfile: runtime/realm/Dockerfile
    container_name: ai-org-os-realm
    # repo 全体を read-only で参照（ADR 等の文書、テスト等）
    # runtime/ だけは書き込み可（Mind spawn = runtime/minds/<name>/ 作成、Nexus storage 書込）
    volumes:
      - ../../:/realm/repo:ro
      - ../../runtime:/realm/runtime
    working_dir: /realm/runtime
    environment:
      # Realm フェーズマーカー。
      AI_ORG_OS_PHASE: "5b-1"
      # Phase 5a-3 (#38): Judgment Pillar の API key をホスト env からパススルー。
      # 未設定でも Realm 自体は起動する。Conductor が rule-based fallback でカバーする。
      # (Judgment README §「API key の扱い」/ ADR-0013 §1 F3 と整合)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Phase 5b-1 (#71): Conductor の挙動 (未設定なら conductor.py のデフォルト)。
      AI_ORG_OS_CONDUCTOR_PERIOD: "${AI_ORG_OS_CONDUCTOR_PERIOD:-30}"
      AI_ORG_OS_CONDUCTOR_MAX_CYCLES: "${AI_ORG_OS_CONDUCTOR_MAX_CYCLES:-0}"
    init: true
    restart: unless-stopped
